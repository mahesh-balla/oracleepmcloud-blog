name: Daily site watcher

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run watcher
        env:
          WATCHER_EMAIL_FROM: ${{ secrets.WATCHER_EMAIL_FROM }}
          WATCHER_EMAIL_TO: ${{ secrets.WATCHER_EMAIL_TO }}
          WATCHER_EMAIL_PASSWORD: ${{ secrets.WATCHER_EMAIL_PASSWORD }}
        run: python watcher/daily_watcher.py